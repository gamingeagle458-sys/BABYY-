<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Quest仇벒잺</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6c1,#ffe4ec);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.container{
    width:380px;
    background:white;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#ff2e63;
}

p{
    font-size:22px;
    color:#444;
}

button{
    padding:14px 22px;
    margin:10px;
    border:none;
    border-radius:40px;
    background:#ff2e63;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
    background:#ff0051;
}

#message{
    margin-top:25px;
    font-size:24px;
    color:#ff2e63;
    white-space:pre-line;
    font-weight:bold;
}

.heart{
    position:absolute;
    color:red;
    animation:float 4s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Love Quest仇벒잺</h1>

<div id="game">
    <p>Ready To Start游땕</p>
    <button onclick="step1()">Yes仇벒잺</button>
</div>

<div id="message"></div>

</div>

<script>

function step1(){
    document.getElementById("game").innerHTML = `
    <p>Are You Still Angry游땴</p>
    <button onclick="step2()">A Little游땴</button>
    <button onclick="step2()">Maybe not游땕</button>
    `;
    hearts();
}

function step2(){
    document.getElementById("game").innerHTML = `
    <p>Can I Make You Smile游땕</p>
    <button onclick="step3()">Try仇벒잺</button>
    <button onclick="step3()">Ok游땫</button>
    `;
    hearts();
}

function step3(){
    document.getElementById("game").innerHTML = `
    <p>What Should I Do游땴</p>
    <button onclick="step4()">Say Sorry仇벒잺</button>
    <button onclick="step4()">Give chocolates游꼶</button>
    <button onclick="step4()">Hug Me游땕</button>
    `;
    hearts();
}

function step4(){
    document.getElementById("game").innerHTML = `
    <p>Did You Know Something游땕</p>
    <button onclick="step5()">What仇벒잺</button>
    `;
    hearts();
}

function step5(){
    document.getElementById("game").innerHTML = `
    <p>You Are My Favorite Person仇벒잺</p>
    <button onclick="step6()">Really游땕</button>
    <button onclick="step6()">Awwwwwwwww游꺛</button>
    `;
    hearts();
}

function step6(){
    document.getElementById("game").innerHTML = `
    <p>And Also游땴</p>
    <button onclick="step7()">Tell Me游땕</button>
    `;
    hearts();
}

function step7(){
    document.getElementById("game").innerHTML = `
    <p>I Miss Your Smile仇벒잺</p>
    <button onclick="step8()">Still Mad游땴</button>
    <button onclick="step8()">Not Much游땕</button>
    `;
    hearts();
}

function step8(){
    document.getElementById("game").innerHTML = `
    <p>Can We Be Happy Again游꺛</p>
    <button onclick="step9()">Maybe仇벒잺</button>
    <button onclick="step9()">Yesss游땕</button>
    `;
    hearts();
}

function step9(){
    document.getElementById("game").innerHTML = `
    <p>One Last Question游땴</p>
    <button onclick="step10()">Okay游땕</button>
    `;
    hearts();
}

function step10(){
    document.getElementById("game").innerHTML = `
    <p>Who Loves You The Most仇벒잺</p>
    <button onclick="finalMessage()">Me游땕</button>
    <button onclick="finalMessage()">Obviously You游꺛</button>
    `;
    hearts();
}

function finalMessage(){

    document.getElementById("game").innerHTML = "";

    document.getElementById("message").innerHTML =
`i loveeeeeeee youuuuuuu仇벒잺
umaaaaaaaaaaaaaaaaaaa游눎`;

    for(let i=0;i<35;i++){
        hearts();
    }
}

function hearts(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "仇벒잺";

    heart.style.left = Math.random() * window.innerWidth + "px";

    heart.style.fontSize = (20 + Math.random()*30) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },4000);
}

setInterval(hearts,900);

</script>

</body>
</html>
